name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag to release (e.g., v0.1.0-alpha.3)'
        required: false
        default: 'v0.1.0-alpha.3'

permissions:
  actions: read
  contents: write

jobs:
  check-version:
    name: Check Version Consistency
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag_name || github.ref }}

      - name: Check version
        uses: ./.github/actions/check-version
        with:
          expected_tag: ${{ github.event.inputs.tag_name || github.ref_name }}

  build:
    name: Build CLI Bundle
    needs: check-version
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag_name || github.ref }}
          submodules: recursive
          fetch-depth: 0

      - name: Setup Python dependencies
        uses: ./.github/actions/setup-python-deps

      - name: Build PyInstaller bundle
        run: |
          uv run --no-sync pyinstaller ecc.spec --clean
          tar -cf dist/ecc.tar -C dist/ecc .

      - name: Package release artifact
        run: |
          mkdir -p dist/release
          gzip -n -9 -c dist/ecc.tar \
            > dist/release/ecc-cli-linux-x86_64.tar.gz

      - name: Smoke test release artifact
        run: |
          mkdir -p dist/pyinstaller-smoke
          tar -xzf dist/release/ecc-cli-linux-x86_64.tar.gz -C dist/pyinstaller-smoke
          dist/pyinstaller-smoke/ecc --help
          dist/pyinstaller-smoke/ecc --version
          dist/pyinstaller-smoke/ecc version --json
          test -x dist/pyinstaller-smoke/_internal/torch/bin/torch_shm_manager

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ecc-cli-linux-x86_64
          path: |
            dist/release/ecc-cli-linux-x86_64.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag_name || github.ref }}
          fetch-depth: 0

      - name: Download CLI artifact
        uses: actions/download-artifact@v4
        with:
          name: ecc-cli-linux-x86_64
          path: dist/release

      - name: Determine tag version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            FULL_TAG="${{ github.event.inputs.tag_name }}"
            TAG_VERSION="${FULL_TAG#v}"
          else
            FULL_TAG="${GITHUB_REF_NAME}"
            TAG_VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"
          echo "full_tag=$FULL_TAG" >> "$GITHUB_OUTPUT"

      - name: Generate changelog with git-cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: .github/cliff.toml
          args: --latest --output release-changelog.md
          github_token: ${{ github.token }}
        env:
          GITHUB_REPO: ${{ github.repository }}

      - name: Generate release notes
        id: notes
        run: |
          {
            cat release-changelog.md
            echo ""
            echo "## Artifacts"
            echo ""
            echo "- ecc-cli-linux-x86_64.tar.gz: PyInstaller onedir CLI bundle for Linux x86_64."
            echo ""
            echo "## Checksums"
            echo ""
            echo '```'
            (
              cd dist/release
              sha256sum ecc-cli-linux-x86_64.tar.gz
            )
            echo '```'
          } > release-notes.md
          cat release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.full_tag }}" \
            --title "ecc ${{ steps.version.outputs.full_tag }}" \
            --notes-file release-notes.md \
            dist/release/ecc-cli-linux-x86_64.tar.gz
